<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
</head>
<body>
    <form>
        <label for ="Expense">Enter the Expense Name:</label>
        <input type="text" id="expense"><br><br>

        <label for="amount">Enter the Expense Amount:</label>
        <input type="number" id="amount"><br><br>

        <label for="category">Category:</label>
        <select id="category">
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        </select><br><br>
        
        <button type="button" id="addExpense">Add Expense</button><br><br>
        <button type="button" id="updateExpense">Update Expense</button><br><br>
        <button type="button" id="deleteExpense">Delete Expense</button><br><br>

        <label for="total">Total:</label>
        <input type="text" id="total" readonly value="0"><br><br>
    </form>
    <script src="labmst.js"></script>
</body>
</html>
